  <script>
    /* Berita data */
    const BERITA = {
      'osn-emas': {
        cat: 'Prestasi', date: '12 Juni 2026',
        title: 'Siswa Raih Emas Olimpiade Sains Provinsi Kepri',
        body: `<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Alhamdulillah, SMA Putra Persada Batam kembali meraih prestasi membanggakan. Ahmad Rizki Pratama, siswa kelas XI, berhasil meraih medali emas pada Olimpiade Sains Nasional (OSN) tingkat Provinsi Kepulauan Riau bidang Matematika.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Prestasi ini diraih setelah melalui seleksi ketat yang diikuti oleh ratusan siswa dari berbagai sekolah di seluruh Provinsi Kepri. Ahmad berhasil menyingkirkan pesaingnya dengan perolehan nilai tertinggi pada babak final yang diselenggarakan di Tanjungpinang.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">"Saya bersyukur dan berterima kasih kepada guru pembimbing serta orang tua yang selalu mendukung. Persiapan yang matang dan doa menjadi kunci keberhasilan ini," ujar Ahmad seusai menerima medali.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed">Kepala Sekolah, Budi Santoso, M.Pd., menyampaikan apresiasi tinggi atas pencapaian ini. "Prestasi Ahmad membuktikan bahwa dengan bimbingan yang tepat dan semangat belajar yang tinggi, siswa Putra Persada mampu bersaing di tingkat provinsi. Kami berharap ini menjadi motivasi bagi seluruh siswa."</p>`
      },
      'pentas-seni': {
        cat: 'Kegiatan', date: '08 Juni 2026',
        title: 'Pentas Seni & Perpisahan Kelas XII Berlangsung Meriah',
        body: `<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Suasana haru bercampur bahagia menyelimuti acara Pentas Seni dan Perpisahan Kelas XII SMA Putra Persada Batam yang digelar pada Sabtu, 8 Juni 2026 di aula sekolah.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Acara yang dihadiri oleh seluruh siswa kelas XII, orang tua, guru, dan staf sekolah ini menampilkan berbagai pertunjukan seni yang telah dipersiapkan selama berminggu-minggu. Mulai dari tari tradisional, paduan suara, drama musikal, hingga penampilan band sekolah.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">"Momen ini sangat berkesan bagi kami. Tiga tahun berlalu begitu cepat, dan kami akan selalu mengenang masa-masa indah di Putra Persada," ucap salah satu perwakilan siswa kelas XII.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed">Seluruh siswa kelas XII yang hadir terlihat kompak mengenakan batik dan tak sedikit yang menitikkan air mata saat sesi perpisahan berlangsung. Semoga sukses selalu untuk seluruh alumni angkatan 2026!</p>`
      },
      'shalat-dhuha': {
        cat: 'Keagamaan', date: '03 Juni 2026',
        title: 'Shalat Dhuha & Tahfiz Rutin Setiap Pagi',
        body: `<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Sebagai bagian dari pembinaan karakter islami, SMA Putra Persada Batam melaksanakan program Shalat Dhuha berjamaah dan Tahfiz Al-Quran setiap pagi sebelum kegiatan pembelajaran dimulai.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Program ini telah berjalan sejak awal tahun ajaran dan diikuti oleh seluruh siswa dengan penuh antusias. Shalat Dhuha dilaksanakan pukul 07.00 WIB di musholla sekolah, diikuti dengan setoran hafalan Al-Quran yang dibimbing oleh guru PAI.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">"Kegiatan ini bukan hanya membentuk kebiasaan ibadah, tetapi juga melatih disiplin dan ketenangan jiwa siswa sebelum memulai aktivitas belajar," ujar Nurhayati, S.Ag., M.Pd., guru Pendidikan Agama Islam.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed">Beberapa siswa bahkan telah berhasil menghafal juz 30 dan sedang dalam proses menghafal juz 29. Program ini mendapat sambutan positif dari orang tua siswa.</p>`
      },
      'beasiswa': {
        cat: 'Beasiswa', date: '20 April 2026',
        title: 'Siswa Berprestasi Raih Beasiswa Penuh Bina Lingkungan',
        body: `<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Tiga siswa SMA Putra Persada Batam berhasil meraih Beasiswa Penuh Bina Lingkungan dari Pemerintah Kota Batam untuk tahun ajaran 2026/2027. Beasiswa ini mencakup biaya pendidikan penuh selama tiga tahun.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Ketiga siswa tersebut adalah Siti Nurhaliza (kelas X), Muhammad Faiz (kelas X), dan Aisyah Putri (kelas XI). Mereka terpilih berdasarkan prestasi akademik, prestasi non-akademik, dan kondisi ekonomi keluarga.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">"Beasiswa ini sangat membantu keluarga saya. Saya berjanji akan terus belajar dengan giat dan membanggakan orang tua serta sekolah," ucap Siti Nurhaliza dengan mata berkaca-kaca.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed">Kepala Sekolah mengapresiasi program pemerintah ini dan berharap lebih banyak siswa berprestasi yang mendapatkan kesempatan serupa di masa mendatang.</p>`
      },
      'study-tour': {
        cat: 'Kegiatan', date: '15 Maret 2026',
        title: 'Study Tour ke Museum Nasional dan Taman Mini',
        body: `<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">SMA Putra Persada Batam mengadakan study tour ke Jakarta bagi siswa kelas X dan XI pada 12–14 Maret 2026. Kunjungan ini bertujuan untuk memperluas wawasan siswa tentang budaya dan sejarah Indonesia.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Destinasi pertama adalah Museum Nasional Indonesia, di mana siswa dapat melihat langsung koleksi artefak bersejarah dari berbagai penjuru Nusantara. Dilanjutkan dengan kunjungan ke Taman Mini Indonesia Indah untuk mengenal keragaman budaya daerah.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">"Belajar tidak hanya di dalam kelas. Pengalaman langsung melihat dan merasakan keberagaman budaya Indonesia memberikan pelajaran yang sangat berharga," ujar salah satu guru pendamping.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed">Seluruh siswa terlihat antusias dan bersemangat selama perjalanan. Kegiatan ini direncanakan akan menjadi program tahunan sekolah.</p>`
      },
      'penanaman-pohon': {
        cat: 'Lingkungan', date: '10 Februari 2026',
        title: 'Aksi Penanaman 100 Pohon di Lingkungan Sekolah',
        body: `<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Dalam rangka memperingati Hari Lingkungan Hidup Sedunia, SMA Putra Persada Batam mengadakan aksi penanaman 100 pohon di lingkungan sekolah dan sekitarnya pada Sabtu, 8 Februari 2026.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">Kegiatan ini diikuti oleh seluruh siswa, guru, dan staf sekolah. Jenis pohon yang ditanam meliputi pohon buah-buahan, pohon pelindung, dan tanaman hias yang ramah lingkungan.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed mb-5">"Menanam pohon adalah investasi untuk masa depan. Siswa kami belajar bahwa menjaga lingkungan adalah tanggung jawab bersama," ujar salah satu guru pembimbing kegiatan.</p>
<p class="text-pine/80 dark:text-cream/80 leading-relaxed">Seluruh pohon yang ditanam akan dirawat oleh siswa melalui program kader lingkungan sekolah. Kegiatan ini diharapkan dapat menjadi kebiasaan positif bagi seluruh warga sekolah.</p>`
      }
    };

    /* Render */
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const data = BERITA[id];

    if (data){
      document.title = data.title + ' — SMA Putra Persada Batam';
      document.getElementById('berita-banner').textContent = '';
      document.getElementById('berita-banner').appendChild(document.createRange().createContextualFragment(`
        <section class="relative z-10 bg-gradient-to-br from-pine to-pine-deep text-cream overflow-hidden">
          <div class="absolute -top-10 -right-10 w-52 h-52 rounded-full bg-brass/15 blur-3xl"></div>
          <div class="max-w-6xl mx-auto px-5 py-16 sm:py-24 relative z-10">
            <nav class="text-xs text-cream/60 mb-5"><a href="index.html" class="hover:text-brass-light">Beranda</a> <span class="mx-1">/</span> <a href="berita.html" class="hover:text-brass-light">Berita</a> <span class="mx-1">/</span> <span class="text-brass-light">${data.cat}</span></nav>
            <p class="inline-flex items-center gap-2 text-xs font-semibold tracking-widest text-brass-light uppercase mb-4"><span class="h-px w-8 bg-brass"></span> ${data.cat}</p>
            <h1 class="font-serif text-3xl sm:text-5xl leading-tight max-w-3xl">${data.title}</h1>
            <p class="text-cream/60 mt-4 text-sm">${data.date}</p>
          </div>
        </section>
      `));
      document.getElementById('berita-content').appendChild(document.createRange().createContextualFragment(`
        <h2 class="font-serif text-2xl sm:text-3xl text-pine dark:text-cream leading-snug mb-6">${data.title}</h2>
        <p class="text-xs text-pine/50 dark:text-cream/50 mb-8 uppercase tracking-wide">${data.cat} · ${data.date}</p>
        ${data.body}
      `));
    } else {
      document.getElementById('berita-banner').appendChild(document.createRange().createContextualFragment(`
        <section class="relative z-10 bg-gradient-to-br from-pine to-pine-deep text-cream overflow-hidden">
          <div class="max-w-6xl mx-auto px-5 py-16 sm:py-24 relative z-10">
            <nav class="text-xs text-cream/60 mb-5"><a href="index.html" class="hover:text-brass-light">Beranda</a> <span class="mx-1">/</span> <a href="berita.html" class="hover:text-brass-light">Berita</a></nav>
            <h1 class="font-serif text-4xl sm:text-6xl leading-tight">Berita Tidak Ditemukan</h1>
          </div>
        </section>
      `));
      document.getElementById('berita-content').appendChild(document.createRange().createContextualFragment(`
        <p class="text-pine/70 dark:text-cream/70 text-center py-10">Berita yang Anda cari tidak tersedia. <a href="berita.html" class="elink text-leaf dark:text-brass-light font-semibold">Kembali ke daftar berita →</a></p>
      `));
    }

    wireHeaderFooter('berita.html');
  </script>
